name: GK Telegram + Fandom Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: gk-telegram-fandom
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # 1. INGEST
      - run: python ingest-brain.py
        env:
          MAIN_BRAIN_EXPORT_URL: ${{ secrets.MAIN_BRAIN_EXPORT_URL }}

      # 2. GENERATE ONLY
      - run: python telegram-arm.py --mode generate
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 3. IMAGE
      - run: python image-arm.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 4. SEND ONLY
      - run: python telegram-arm.py --mode send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}

      # 5. COMMIT STATE
      - run: |
          git config user.name "GK Bot"
          git config user.email "gk-bot@users.noreply.github.com"
          git add .
          git commit -m "bot update" || echo "no changes"
          git push
