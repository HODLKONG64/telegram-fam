name: GK Telegram + Fandom Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: gk-telegram-fandom
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # -----------------------------
      # 1. INGEST MAIN BRAIN
      # -----------------------------
      - name: Ingest Main Brain Export
        run: python ingest-brain.py
        env:
          MAIN_BRAIN_EXPORT_URL: ${{ secrets.MAIN_BRAIN_EXPORT_URL }}

      # -----------------------------
      # 2. GENERATE LORE (NO POST)
      # -----------------------------
      - name: Generate Lore
        run: python telegram-arm.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ""
          CHANNEL_CHAT_IDS: ""

      # -----------------------------
      # 3. GENERATE IMAGE
      # -----------------------------
      - name: Generate Character Image
        run: python image-arm.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # -----------------------------
      # 4. CHARACTER MEMORY UPDATE
      # -----------------------------
      - name: Update Character Memory
        run: python character-memory.py

      # -----------------------------
      # 5. FINAL TELEGRAM POST
      # -----------------------------
      - name: Send Telegram Post
        run: python telegram-arm.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}

      # -----------------------------
      # 6. UPDATE FANDOM
      # -----------------------------
      - name: Update Fandom Wiki
        run: python fandom-arm.py
        env:
          FANDOM_WIKI_URL: ${{ secrets.FANDOM_WIKI_URL }}
          FANDOM_BOT_USER: ${{ secrets.FANDOM_BOT_USER }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}

      # -----------------------------
      # 7. COMMIT STATE
      # -----------------------------
      - name: Commit state + outputs
        run: |
          git config user.name "GK Bot"
          git config user.email "gk-bot@users.noreply.github.com"

          git add bot-state.json main-brain-export.json latest-lore.json image-state.json character-memory.json output/

          git diff --cached --quiet || git commit -m "bot: update state + lore + character memory [skip ci]"
          git push
