name: GK Telegram + Fandom Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: gk-telegram-fandom
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_KEY: sam-memory.json
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Generate Lore from shared SAM memory
        run: python telegram-arm.py
        env:
          GENERATE_ONLY: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Lock Character Traits
        run: python character-traits.py

      - name: Generate Character Image
        run: python image-arm.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Update Character Memory
        run: python character-memory.py

      - name: Send Telegram Post
        run: python telegram-arm.py
        env:
          SEND_ONLY: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}

      - name: Update Fandom Wiki
        run: python fandom-arm.py
        env:
          FANDOM_WIKI_URL: ${{ secrets.FANDOM_WIKI_URL }}
          FANDOM_BOT_USER: ${{ secrets.FANDOM_BOT_USER }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}

      - name: Commit outputs only
        run: |
          git config user.name "GK Bot"
          git config user.email "gk-bot@users.noreply.github.com"

          git add \
            latest-lore.json \
            image-state.json \
            character-memory.json \
            output/

          git diff --cached --quiet || git commit -m "bot: update lore + image + memory [skip ci]"
          git push
