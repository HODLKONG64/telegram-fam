name: GK Brain Lite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

concurrency:
  group: gk-brain-lite
  cancel-in-progress: false

jobs:
  run-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FANDOM_BOT_USER: ${{ secrets.FANDOM_BOT_USER }}
      FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
      FANDOM_WIKI_URL: ${{ secrets.FANDOM_WIKI_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl brain
        run: python crawl-brain.py

      - name: Run lore brain
        run: python lore-brain.py

      - name: Run wiki brain
        run: python wiki-brain.py

      - name: Commit updated state
        run: |
          git config user.name "GK Brain Lite"
          git config user.email "gk-brain-lite@users.noreply.github.com"
          git add crawl-results.json crawl-fingerprints.json lore-history.md wiki-state.json
          git diff --cached --quiet || git commit -m "chore: brain lite state update [skip ci]"
          git push
